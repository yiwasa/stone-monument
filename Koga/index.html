<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>古賀の水害碑</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        /* 全体の設定 */
        body { margin: 0; padding: 0; width: 100vw; height: 100vh; background-color: #333; font-family: sans-serif; overflow: hidden; }
        model-viewer { width: 100%; height: 100%; }
        
        /* タイトルと説明文のスタイル（画面に重ねる） */
        .ui-container {
            position: absolute; /* 画面から浮かせて固定 */
            top: 20px;
            left: 20px;
            color: white;
            pointer-events: none; /* テキストの上からでもマウスで3Dモデルを操作できるようにする */
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8); /* 文字を読みやすくする影 */
            z-index: 10;
        }
        .ui-container h1 {
            margin: 0 0 10px 0;
            font-size: 24px;
        }
        .ui-container p {
            margin: 0;
            font-size: 14px;
            line-height: 1.6;
            background-color: rgba(0, 0, 0, 0.5); /* 半透明の黒背景 */
            padding: 15px;
            border-radius: 8px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="ui-container">
        <h1>古賀の水害碑</h1>
        <p>
            <strong>【操作方法】</strong><br>
            左クリック（スマホは1本指）：回転<br>
            右クリック（スマホは2本指）：移動<br>
            ホイール（スマホはピンチ）：拡大・縮小
        </p>
    </div>

    <model-viewer 
        src="Koga_Suigaihi.glb" 
        alt="石碑の3Dモデル" 
        camera-controls 
        shadow-intensity="1">
    </model-viewer>
</body>
</html>
