<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>石碑3Dビューア</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body { margin: 0; padding: 0; width: 100vw; height: 100vh; background-color: #333; }
        model-viewer { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <model-viewer 
        src="Koga_Suigaihi.glb" 
        alt="石碑の3Dモデル" 
        camera-controls 
        auto-rotate 
        shadow-intensity="1">
    </model-viewer>
</body>
</html>
